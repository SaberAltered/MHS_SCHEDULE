<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHS Schedule Tracker</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-a: #f87171; /* A Day Red */
            --accent-b: #60a5fa; /* B Day Blue */
            --highlight: #22c55e;
            --robotics: #fbbf24; /* Robotics Gold */
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header { text-align: center; margin-bottom: 20px; }
        #date-display { color: var(--text-dim); font-size: 1rem; }
        #day-display { font-size: 3.5rem; font-weight: 800; margin: 5px 0; }

        /* Theme Switching */
        .is-a #day-display { color: var(--accent-a); }
        .is-b #day-display { color: var(--accent-b); }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(0,0,0,0.2); padding: 12px; text-align: left; color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .time-col { color: var(--text-dim); width: 35%; font-size: 0.9rem; font-variant-numeric: tabular-nums; }
        .note { display: block; font-size: 0.75rem; color: var(--text-dim); margin-top: 4px; font-style: italic; }

        .current-row {
            background: rgba(34, 197, 94, 0.1);
            border-left: 4px solid var(--highlight);
        }
        .current-row .time-col { color: var(--highlight); font-weight: bold; }

        .robotics-card {
            border: 1px solid var(--robotics);
            padding: 15px;
            background: rgba(251, 191, 36, 0.05);
            border-radius: 12px;
            display: none; /* Hidden by default */
        }
        .robotics-card h3 { margin: 0; color: var(--robotics); font-size: 1rem; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body id="body-tag">

    <div class="header">
        <div id="date-display"></div>
        <div id="day-display">Loading...</div>
    </div>

    <div class="container">
        <div id="robotics-alert" class="robotics-card">
            <h3>🤖 Robotics Today</h3>
            <p id="robotics-time" style="margin: 5px 0 0 0; font-size: 0.9rem;"></p>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr><th>Time</th><th>Class</th></tr>
                </thead>
                <tbody id="schedule-body"></tbody>
            </table>
        </div>
    </div>

<script>
    const schedule = {
        "A": [
            { name: "Forensics", start: "08:30", end: "09:55" },
            { name: "PSP", start: "10:10", end: "11:35", note: "Mainly free time unless work is due" },
            { name: "US History", start: "11:50", end: "13:15" },
            { name: "Lunch", start: "13:15", end: "13:45" },
            { name: "Work Experience", start: "14:00", end: "15:25", note: "School store - free unless customers arrive" }
        ],
        "B": [
            { name: "Welding", start: "08:30", end: "09:55" },
            { name: "English 11", start: "10:10", end: "11:35" },
            { name: "Lunch", start: "11:50", end: "12:20" },
            { name: "Strategic Geometry", start: "12:20", end: "13:45" },
            { name: "Peer Tutoring", start: "13:45", end: "15:25" }
        ]
    };

    const startDate = new Date("2025-09-02");
    const startType = "A";

    function getDayType(date) {
        let count = 0;
        let cur = new Date(startDate);
        cur.setHours(0,0,0,0);
        let target = new Date(date);
        target.setHours(0,0,0,0);

        while (cur < target) {
            cur.setDate(cur.getDate() + 1);
            if (cur.getDay() !== 0 && cur.getDay() !== 6) count++;
        }
        return (count % 2 === 0) ? startType : (startType === "A" ? "B" : "A");
    }

    function update() {
        const now = new Date();
        const dayOfWeek = now.getDay(); // 0=Sun, 2=Tue, 4=Thu, 6=Sat
        const type = getDayType(now);
        const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);

        // Header
        document.getElementById("date-display").innerText = now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
        document.getElementById("day-display").innerText = isWeekend ? (dayOfWeek === 6 ? "Saturday" : "Sunday") : type + " Day";
        document.getElementById("body-tag").className = isWeekend ? "" : "is-" + type.toLowerCase();

        // Robotics Logic
        const robAlert = document.getElementById("robotics-alert");
        const robTime = document.getElementById("robotics-time");
        if (dayOfWeek === 2 || dayOfWeek === 4) {
            robAlert.style.display = "block";
            robTime.innerText = "Meeting starts at 6:00 PM";
        } else if (dayOfWeek === 6) {
            robAlert.style.display = "block";
            robTime.innerText = "Workshop: 7:00 AM - 3:00 PM";
        } else {
            robAlert.style.display = "none";
        }

        // Schedule Logic
        const list = isWeekend ? [] : schedule[type];
        const timeNow = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        
        let html = list.map(item => {
            const active = timeNow >= item.start && timeNow <= item.end;
            return `<tr class="${active ? 'current-row' : ''}">
                <td class="time-col">${item.start} - ${item.end}</td>
                <td>
                    ${item.name}
                    ${item.note ? `<span class="note">${item.note}</span>` : ''}
                </td>
            </tr>`;
        }).join('');

        if (isWeekend && dayOfWeek !== 6) html = "<tr><td colspan='2' style='text-align:center; color:var(--text-dim)'>No school today!</td></tr>";
        if (dayOfWeek === 6) html = "<tr><td colspan='2' style='text-align:center; color:var(--text-dim)'>Check Robotics schedule above</td></tr>";

        document.getElementById("schedule-body").innerHTML = html;
    }

    update();
    setInterval(update, 30000); // Check every 30 seconds
</script>
</body>
</html>
